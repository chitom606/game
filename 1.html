<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Neon Survival - Perfected</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; overflow: hidden; margin: 0; }
        canvas { background: #080808; border: 4px solid #444; display: block; margin: 10px auto; }
        .hud { font-size: 20px; padding: 10px; color: #0ff; }
    </style>
</head>
<body>
    <div class="hud">分數: <span id="score">0</span> | 連段: <span id="combo">0</span>x | 生命: <span id="lives">3</span></div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let score = 0, lives = 3, combo = 0, gameRunning = true, invulnerable = 0;
// 使用物件紀錄鍵盤狀態，解決卡頓關鍵
let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

let player = { x: 300, y: 200, w: 20, h: 20, speed: 5 };
let enemy = { x: 50, y: 50, w: 20, h: 20 };
let powerup = { x: 400, y: 300, w: 15, h: 15 };
let walls = [], particles = [];

// 事件監聽：只更新狀態，不進行移動運算
window.addEventListener("keydown", e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
window.addEventListener("keyup", e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

function updateWalls() {
    walls = []; 
    for (let i = 0; i < 4; i++) {
        let newWall, isSafe = false;
        while (!isSafe) {
            newWall = { x: Math.random()*500, y: Math.random()*300, w: 100, h: 20 };
            if (Math.hypot(newWall.x - player.x, newWall.y - player.y) > 90) isSafe = true;
        }
        walls.push(newWall);
    }
}
updateWalls();
setInterval(updateWalls, 5000);

function gameLoop() {
    if(!gameRunning) return;

    // 1. 移動運算 (根據鍵盤狀態在每一幀移動)
    let dx = 0, dy = 0;
    if(keys["ArrowUp"]) dy -= player.speed;
    if(keys["ArrowDown"]) dy += player.speed;
    if(keys["ArrowLeft"]) dx -= player.speed;
    if(keys["ArrowRight"]) dx += player.speed;

    let nextX = player.x + dx;
    let nextY = player.y + dy;

    // 碰撞檢查
    let hitWall = walls.some(w => nextX < w.x + w.w && nextX + player.w > w.x && nextY < w.y + w.h && nextY + player.h > w.y);
    if(!hitWall && nextX > 0 && nextX < 580 && nextY > 0 && nextY < 380) {
        player.x = nextX; player.y = nextY;
    }

    // 2. 敵人 AI
    enemy.x += (player.x - enemy.x) * 0.025;
    enemy.y += (player.y - enemy.y) * 0.025;

    // 3. 吃道具
    if(Math.hypot(player.x - powerup.x, player.y - powerup.y) < 20) {
        combo++; score += (10 * combo);
        document.getElementById('score').innerText = score;
        document.getElementById('combo').innerText = combo;
        for(let i=0; i<10; i++) particles.push({x: powerup.x, y: powerup.y, vx: Math.random()*4-2, vy: Math.random()*4-2, life: 20});
        powerup.x = 50 + Math.random()*500; powerup.y = 50 + Math.random()*300;
    }

    // 4. 受傷
    if(invulnerable > 0) invulnerable--;
    else if(Math.hypot(player.x - enemy.x, player.y - enemy.y) < 25) {
        lives--; combo = 0; invulnerable = 120;
        document.getElementById('lives').innerText = lives;
        document.getElementById('combo').innerText = combo;
        if(lives <= 0) { gameRunning = false; alert("最終得分: " + score); location.reload(); }
    }

    // 5. 渲染
    ctx.clearRect(0, 0, 600, 400);
    walls.forEach(w => { ctx.fillStyle = "#555"; ctx.fillRect(w.x, w.y, w.w, w.h); });
    
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life--;
        ctx.fillStyle = `rgba(255, 255, 0, ${p.life/20})`;
        ctx.fillRect(p.x, p.y, 5, 5);
        if(p.life <= 0) particles.splice(i, 1);
    });

    ctx.globalAlpha = (invulnerable > 0 && invulnerable % 20 < 10) ? 0.3 : 1.0;
    ctx.fillStyle = "#0ff"; ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.globalAlpha = 1.0;

    ctx.fillStyle = "#f00"; ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
    ctx.fillStyle = "#ff0"; ctx.fillRect(powerup.x, powerup.y, powerup.w, powerup.h);
    
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
